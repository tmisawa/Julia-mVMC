name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: test (${{ matrix.os }}, Julia ${{ matrix.julia-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: ["ubuntu-latest", "macos-latest"]
        julia-version: ["1.11", "1.12"]
      fail-fast: false

    env:
      # CI runs the smoke-test step counts; release-gate sweeps (50 SR steps)
      # are run locally before tagging.
      JULIA_MVMC_EXAMPLE_STEPS: "5"

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install native prerequisites (Linux)
        if: ${{ runner.os == 'Linux' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y gfortran g++ make libblas-dev liblapack-dev

      - name: Install native prerequisites (macOS)
        if: ${{ runner.os == 'macOS' }}
        shell: bash
        run: |
          brew install gcc
          if ! command -v gfortran >/dev/null 2>&1; then
            gfortran_bin="$(find "$(brew --prefix gcc)/bin" -maxdepth 1 \( -type f -o -type l \) -name 'gfortran-*' | head -n 1)"
            if [ -z "$gfortran_bin" ]; then
              echo "No Homebrew gfortran executable found" >&2
              exit 1
            fi
            mkdir -p "$RUNNER_TEMP/gfortran-shim"
            ln -sf "$gfortran_bin" "$RUNNER_TEMP/gfortran-shim/gfortran"
            echo "$RUNNER_TEMP/gfortran-shim" >> "$GITHUB_PATH"
            export PATH="$RUNNER_TEMP/gfortran-shim:$PATH"
          fi
          gfortran --version

      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.julia-version }}

      - uses: julia-actions/cache@v2

      - name: Build subpackages (native deps)
        run: |
          julia --project=@. -e 'using Pkg; Pkg.instantiate(); Pkg.build(verbose=true)'

      - name: Run unit tests (each subpackage)
        run: |
          for d in SFMT.jl MVMCExpertModeParsers.jl PfaPack.jl MVMCOptimizers.jl; do
            echo "=== $d ==="
            (cd "$d" && julia --project=@. -e 'using Pkg; Pkg.test()')
          done

      - name: Run integration tests
        run: |
          julia --project=@. test/integration/runtests.jl

      - name: Run C ctest-equivalent integration tests
        run: |
          julia --project=@. test/integration/ctest_equivalent.jl

      - name: Run examples (smoke test, JULIA_MVMC_EXAMPLE_STEPS=5)
        run: |
          for f in examples/*.jl; do
            echo "=== $f ==="
            julia --project=@. "$f"
          done
